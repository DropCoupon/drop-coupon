services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dropcoupon
      POSTGRES_USER: dropcoupon
      POSTGRES_PASSWORD: dropcoupon
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dropcoupon -d dropcoupon"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:v24.2.2
    command: redpanda start --smp 1 --memory 1G --overprovisioned
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health", "--exit-code"]
      interval: 10s
      timeout: 5s
      retries: 5
